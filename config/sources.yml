  # Tier 2: Cryptography & ZK
  - name: "Cryptography Engineering"
    type: "rss"
    url: "https://blog.cryptographyengineering.com/feed/"
    tier: 2
    tags: ["cryptography", "privacy", "zk"]
    enabled: true

  - name: "Vitalik Buterin"
    type: "rss"
    url: "https://vitalik.eth.limo/feed.xml"
